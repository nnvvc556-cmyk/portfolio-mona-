<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة التحكم</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"><style>body{margin:0;font-family:Tajawal,system-ui;background:#f6f2eb;color:#263437}.container{width:min(1100px,calc(100% - 28px));margin:32px auto}.header{background:linear-gradient(135deg,#789c95,#52746e);color:#fff;padding:28px;border-radius:28px;box-shadow:0 24px 60px rgba(55,76,73,.16)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.card{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.8);border-radius:24px;padding:22px;box-shadow:0 16px 40px rgba(55,76,73,.08)}label{font-weight:900;display:block;margin:14px 0 7px}input,textarea{width:100%;border:1px solid rgba(120,156,149,.35);border-radius:16px;padding:13px;font-family:inherit;font-size:15px}textarea{min-height:90px;resize:vertical}button{border:0;border-radius:999px;padding:13px 22px;font-family:inherit;font-weight:900;background:#52746e;color:white;cursor:pointer;margin-top:14px}.list{display:grid;gap:10px;margin-top:12px}.item{padding:12px;border-radius:14px;background:#fff;display:flex;justify-content:space-between;gap:10px;align-items:center}.danger{background:#a64b4b}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="container"><div class="header"><h1>لوحة تحكم ملف الإنجاز</h1><p>تعديل النصوص + رفع ملفات وصور + إدارة المرفقات.</p></div><div class="grid"><section class="card"><h2>تعديل بيانات الموقع</h2><label>العنوان الرئيسي</label><input id="title"><label>المقدمة</label><textarea id="intro"></textarea><label>نبذة عني</label><textarea id="about"></textarea><button onclick="saveSite()">حفظ التعديلات</button><small id="saveMsg"></small></section><section class="card"><h2>رفع ملفات وصور</h2><input type="file" id="files" multiple accept="image/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx"><button onclick="upload()">رفع</button><div class="list" id="fileList"></div></section></div><section class="card" style="margin-top:18px"><h2>إعدادات Render</h2><p><b>Build Command:</b> npm install</p><p><b>Start Command:</b> npm start</p><p><b>لوحة التحكم:</b> /admin</p></section></div><script>async function load(){const site=await(await fetch('/api/site')).json();title.value=site.title||'';intro.value=site.intro||'';about.value=site.about||'';await loadFiles()}async function saveSite(){await fetch('/api/site',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title.value,intro:intro.value,about:about.value})});saveMsg.textContent='تم الحفظ بنجاح'}async function upload(){const form=new FormData();[...files.files].forEach(f=>form.append('files',f));await fetch('/api/upload',{method:'POST',body:form});files.value='';await loadFiles()}async function loadFiles(){const data=await(await fetch('/api/files')).json();fileList.innerHTML=data.map(f=>`<div class="item"><a href="${f.url}" target="_blank">${f.originalName}</a><button class="danger" onclick="delFile('${f.id}')">حذف</button></div>`).join('')}async function delFile(id){await fetch('/api/files/'+id,{method:'DELETE'});await loadFiles()}load();</script></body></html>
